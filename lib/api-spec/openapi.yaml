openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Prompt to iOS App Generator
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and session management
  - name: billing
    description: Stripe billing and subscription management
  - name: projects
    description: iOS app project operations
  - name: generate
    description: AI code generation operations
  - name: refinement
    description: AI-powered iterative code modification
  - name: providers
    description: AI provider configuration
  - name: templates
    description: Curated prompt templates
  - name: teams
    description: Team/workspace management and collaboration
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /readyz:
    get:
      operationId: readinessCheck
      tags: [health]
      summary: Deep readiness check (DB connectivity, metrics, memory)
      responses:
        "200":
          description: All checks passed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: One or more checks failed (degraded)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"

  # ── Auth ───────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Create a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Account created, session cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
        "409":
          description: Email already exists

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Authenticated, session cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Destroy current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user and quota
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Not authenticated

  /auth/password:
    put:
      operationId: changePassword
      tags: [auth]
      summary: Change password (requires authentication)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]
        "401":
          description: Not authenticated or wrong current password

  # ── Billing ────────────────────────────────────────────────────────────────

  /billing/plans:
    get:
      operationId: getPlans
      tags: [billing]
      summary: Get available subscription plans
      responses:
        "200":
          description: Plan details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlansResponse"

  /billing/checkout:
    post:
      operationId: createCheckout
      tags: [billing]
      summary: Create Stripe Checkout session (requires authentication)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutBody"
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                required: [url]
        "401":
          description: Not authenticated
        "503":
          description: Stripe not configured

  /billing/subscription:
    get:
      operationId: getSubscription
      tags: [billing]
      summary: Get current subscription info (requires authentication)
      responses:
        "200":
          description: Subscription details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
        "401":
          description: Not authenticated

  /billing/portal:
    post:
      operationId: createPortal
      tags: [billing]
      summary: Create Stripe Customer Portal session (requires authentication)
      responses:
        "200":
          description: Portal session URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                required: [url]
        "400":
          description: No billing account found
        "401":
          description: Not authenticated
        "503":
          description: Stripe not configured

  /billing/webhook:
    post:
      operationId: stripeWebhook
      tags: [billing]
      summary: Stripe webhook endpoint (HMAC-verified)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                required: [received]
        "400":
          description: Invalid signature
        "503":
          description: Webhook secret not configured

  # ── Providers & Templates ──────────────────────────────────────────────────

  /providers:
    get:
      operationId: getProviders
      tags: [providers]
      summary: Get available AI providers and their models
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvidersResponse"

  /templates:
    get:
      operationId: getTemplates
      tags: [templates]
      summary: Get curated prompt templates
      responses:
        "200":
          description: Template list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PromptTemplate"

  # ── Projects ───────────────────────────────────────────────────────────────

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{id}/files:
    get:
      operationId: getProjectFiles
      tags: [projects]
      summary: Get all generated files for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectFile"

  /projects/{id}/files/{fileId}:
    put:
      operationId: updateProjectFile
      tags: [projects]
      summary: Update the content of a project file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: fileId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFileBody"
      responses:
        "200":
          description: Updated file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFile"
        "400":
          description: Invalid request body
        "404":
          description: Project or file not found

  /projects/{id}/share:
    post:
      operationId: shareProject
      tags: [projects]
      summary: Generate a public share token for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Share token and URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareResult"
        "404":
          description: Not found

  /share/{token}:
    get:
      operationId: getSharedProject
      tags: [projects]
      summary: Get a shared project by token (public, read-only)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shared project with files
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedProject"
        "404":
          description: Not found

  /projects/{id}/generate:
    post:
      operationId: generateApp
      tags: [generate]
      summary: Run clarify (if needed) then planning (Phase 1, streaming). Pauses for clarifications or plan approval.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateAppBody"
      responses:
        "200":
          description: SSE stream — emits clarify_questions OR planning_chunk/plan/awaiting_approval
          content:
            text/event-stream:
              schema:
                type: string

  /projects/{id}/answer-clarifications:
    post:
      operationId: answerClarifications
      tags: [generate]
      summary: Submit answers to clarifying questions and resume into the planning phase (streaming).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerClarificationsBody"
      responses:
        "200":
          description: SSE stream of planning phase using the enriched prompt
          content:
            text/event-stream:
              schema:
                type: string

  /projects/{id}/approve-plan:
    post:
      operationId: approvePlan
      tags: [generate]
      summary: Approve plan, run code generation, then accuracy validation + repair (streaming).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovePlanBody"
      responses:
        "200":
          description: SSE stream of code generation, validation, repair
          content:
            text/event-stream:
              schema:
                type: string

  /projects/{id}/preview:
    get:
      operationId: getProjectPreview
      tags: [projects]
      summary: Render live HTML preview of the generated app
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Self-contained HTML preview document
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Not found or preview not yet generated

  /share/{token}/preview:
    get:
      operationId: getSharedProjectPreview
      tags: [projects]
      summary: Render live HTML preview of a shared project (public)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Self-contained HTML preview document
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Not found

  # ── Refinement ─────────────────────────────────────────────────────────────

  /projects/{id}/refinements:
    get:
      operationId: getRefinements
      tags: [refinement]
      summary: Get refinement chat history for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Refinement messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RefinementMessage"

  /projects/{id}/refine:
    post:
      operationId: refineProject
      tags: [refinement]
      summary: Submit a refinement instruction (requires Pro/Studio plan)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefineBody"
      responses:
        "200":
          description: Refinement result with changed files
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefineResult"
        "400":
          description: Validation error or project has no files
        "401":
          description: Not authenticated
        "403":
          description: Requires Pro or Studio plan
        "404":
          description: Project not found

  # ── Web Generation ────────────────────────────────────────────────────────

  /projects/{id}/generate-web:
    post:
      operationId: generateWeb
      tags: [generate]
      summary: Generate a React + Tailwind web app (SSE stream, requires react framework)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream of web generation events
          content:
            text/event-stream:
              schema:
                type: string

  # ── Download ──────────────────────────────────────────────────────────────

  /projects/{id}/download:
    get:
      operationId: downloadProject
      tags: [projects]
      summary: Download project as a zip file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Zip file
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "404":
          description: Not found or no files

  # ── Stats & Recent ────────────────────────────────────────────────────────

  /projects/recent:
    get:
      operationId: getRecentProjects
      tags: [projects]
      summary: Get the 5 most recently updated projects
      responses:
        "200":
          description: Recent projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  /projects/stats:
    get:
      operationId: getProjectStats
      tags: [projects]
      summary: Get aggregate stats (total projects, total files generated, etc.)
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectStats"

  # ── Teams ────────────────────────────────────────────────────────────────────

  /teams:
    post:
      operationId: createTeam
      tags: [teams]
      summary: Create a new team
      description: Creates a team and makes the authenticated user the owner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamBody"
      responses:
        "201":
          description: Team created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "401":
          description: Authentication required
        "409":
          description: Slug already exists
    get:
      operationId: listTeams
      tags: [teams]
      summary: List teams for the authenticated user
      responses:
        "200":
          description: List of teams with user role
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamWithRole"
        "401":
          description: Authentication required

  /teams/{id}:
    get:
      operationId: getTeam
      tags: [teams]
      summary: Get team details and members
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team details with members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamDetails"
        "401":
          description: Authentication required
        "403":
          description: Not a team member

  /teams/{id}/members:
    post:
      operationId: inviteTeamMember
      tags: [teams]
      summary: Invite a user to the team by email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberBody"
      responses:
        "201":
          description: Member added or invitation created
        "401":
          description: Authentication required
        "403":
          description: Requires admin or owner role
        "409":
          description: User is already a member

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        prompt:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, awaiting_clarification, generating, awaiting_approval, complete, error]
        framework:
          type: string
          enum: [swiftui, uikit, react]
        fileCount:
          type: integer
        architecturePlan:
          type: ["string", "null"]
        clarifyingQuestions:
          type: ["string", "null"]
        clarifyAnswers:
          type: ["string", "null"]
        enrichedPrompt:
          type: ["string", "null"]
        accuracyReport:
          type: ["string", "null"]
        repairHistory:
          type: ["string", "null"]
        livePreviewHtml:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - prompt
        - description
        - status
        - framework
        - fileCount
        - architecturePlan
        - clarifyingQuestions
        - clarifyAnswers
        - enrichedPrompt
        - accuracyReport
        - repairHistory
        - livePreviewHtml
        - createdAt
        - updatedAt

    CreateProjectBody:
      type: object
      properties:
        name:
          type: string
        prompt:
          type: string
        framework:
          type: string
          enum: [swiftui, uikit, react]
      required:
        - name
        - prompt
        - framework

    ProjectFile:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        filename:
          type: string
        filepath:
          type: string
        content:
          type: string
        language:
          type: string
        createdAt:
          type: string
      required:
        - id
        - projectId
        - filename
        - filepath
        - content
        - language
        - createdAt

    UpdateFileBody:
      type: object
      properties:
        content:
          type: string
          maxLength: 512000
      required:
        - content

    GenerateAppBody:
      type: object
      properties:
        additionalContext:
          type: ["string", "null"]
      required: []

    ApprovePlanBody:
      type: object
      properties:
        plan:
          type: object
          properties:
            screens:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  purpose:
                    type: string
                required: [name, purpose]
            models:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  fields:
                    type: array
                    items:
                      type: string
                required: [name, fields]
            navigation:
              type: string
            spmDependencies:
              type: array
              items:
                type: object
                properties:
                  url:
                    type: string
                  packageName:
                    type: string
                  productNames:
                    type: array
                    items:
                      type: string
                  version:
                    type: string
                required: [url, packageName, productNames, version]
            fileList:
              type: array
              items:
                type: object
                properties:
                  filename:
                    type: string
                  purpose:
                    type: string
                required: [filename, purpose]
          required: [screens, models, navigation, spmDependencies, fileList]
        additionalContext:
          type: ["string", "null"]
      required:
        - plan

    AnswerClarificationsBody:
      type: object
      properties:
        skip:
          type: boolean
        answers:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              question:
                type: string
              answer:
                type: string
            required:
              - id
              - question
              - answer
        additionalContext:
          type: ["string", "null"]
      required:
        - answers

    ReadinessResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ready, degraded]
        checks:
          type: object
          additionalProperties:
            type: string
            enum: [ok, error]
        uptime:
          type: integer
        version:
          type: string
        environment:
          type: string
        sentry:
          type: boolean
        metrics:
          type: object
          properties:
            totalRequests:
              type: integer
            totalErrors:
              type: integer
            statusCodes:
              type: object
              additionalProperties:
                type: integer
            avgResponseTimeMs:
              type: number
            p95ResponseTimeMs:
              type: number
          required: [totalRequests, totalErrors, statusCodes, avgResponseTimeMs, p95ResponseTimeMs]
        memory:
          type: object
          properties:
            rss:
              type: integer
            heapUsed:
              type: integer
            heapTotal:
              type: integer
          required: [rss, heapUsed, heapTotal]
      required: [status, checks, uptime, version, environment, sentry, metrics, memory]

    # ── Auth schemas ──────────────────────────────────────────────────────────

    RegisterBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string
      required: [email, password]

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    ChangePasswordBody:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
      required: [currentPassword, newPassword]

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        displayName:
          type: ["string", "null"]
        plan:
          type: string
          enum: [free, pro, studio]
      required: [id, email, displayName, plan]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
      required: [user]

    Quota:
      type: object
      properties:
        used:
          type: integer
        limit:
          type: integer
        resetsAt:
          type: string
      required: [used, limit, resetsAt]

    MeResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        quota:
          $ref: "#/components/schemas/Quota"
      required: [user]

    # ── Billing schemas ────────────────────────────────────────────────────────

    PlanInfo:
      type: object
      properties:
        name:
          type: string
        price:
          type: string
        features:
          type: array
          items:
            type: string
      required: [name, price, features]

    PlansResponse:
      type: object
      properties:
        plans:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/PlanInfo"
      required: [plans]

    CheckoutBody:
      type: object
      properties:
        plan:
          type: string
          enum: [pro, studio]
      required: [plan]

    SubscriptionResponse:
      type: object
      properties:
        plan:
          type: string
        status:
          type: string
        currentPeriodEnd:
          type: ["string", "null"]
        usage:
          type: integer
        planDetails:
          $ref: "#/components/schemas/PlanInfo"
      required: [plan, status, usage, planDetails]

    # ── Provider & Template schemas ────────────────────────────────────────────

    ProviderModels:
      type: object
      properties:
        planner:
          type: string
        engineer:
          type: string
        reviewer:
          type: string
      required: [planner, engineer, reviewer]

    ProvidersResponse:
      type: object
      properties:
        providers:
          type: array
          items:
            type: string
        default:
          type: ["string", "null"]
        models:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ProviderModels"
      required: [providers, default, models]

    PromptTemplate:
      type: object
      properties:
        label:
          type: string
        category:
          type: string
        tagline:
          type: string
        signature:
          type: string
        screens:
          type: array
          items:
            type: string
        accent:
          type: string
        emoji:
          type: string
        prompt:
          type: string
      required: [label, category, tagline, signature, screens, accent, emoji, prompt]

    # ── Refinement schemas ─────────────────────────────────────────────────────

    RefineBody:
      type: object
      properties:
        instruction:
          type: string
          minLength: 1
      required: [instruction]

    RefinementMessage:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        filesChanged:
          type: ["array", "null"]
          items:
            type: string
        createdAt:
          type: string
      required: [id, projectId, role, content, createdAt]

    RefineResult:
      type: object
      properties:
        summary:
          type: string
        filesChanged:
          type: array
          items:
            type: string
        files:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              content:
                type: string
            required: [path, content]
      required: [summary, filesChanged]

    # ── Project schemas ────────────────────────────────────────────────────────

    ProjectStats:
      type: object
      properties:
        totalProjects:
          type: integer
        totalFilesGenerated:
          type: integer
        completedProjects:
          type: integer
        frameworkBreakdown:
          type: object
          properties:
            swiftui:
              type: integer
            uikit:
              type: integer
          required:
            - swiftui
            - uikit
      required:
        - totalProjects
        - totalFilesGenerated
        - completedProjects
        - frameworkBreakdown

    ShareResult:
      type: object
      properties:
        token:
          type: string
        url:
          type: string
      required:
        - token
        - url

    SharedProject:
      type: object
      properties:
        project:
          $ref: "#/components/schemas/Project"
        files:
          type: array
          items:
            $ref: "#/components/schemas/ProjectFile"
      required:
        - project
        - files

    # ── Team schemas ───────────────────────────────────────────────────────────

    CreateTeamBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          minLength: 1
          maxLength: 100
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
      required:
        - name
        - slug

    InviteMemberBody:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, member, viewer]
      required:
        - email
        - role

    Team:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        plan:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - plan

    TeamWithRole:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        plan:
          type: string
        role:
          type: string
          enum: [owner, admin, member, viewer]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - plan
        - role

    TeamMember:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        role:
          type: string
          enum: [owner, admin, member, viewer]
        joinedAt:
          type: string
          format: date-time
        email:
          type: string
        displayName:
          type: string
          nullable: true
      required:
        - id
        - userId
        - role
        - email

    TeamDetails:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        plan:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        members:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"
      required:
        - id
        - name
        - slug
        - plan
        - members
