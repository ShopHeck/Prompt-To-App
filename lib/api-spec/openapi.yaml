openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Prompt to iOS App Generator
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: iOS app project operations
  - name: generate
    description: AI code generation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{id}/files:
    get:
      operationId: getProjectFiles
      tags: [projects]
      summary: Get all generated files for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectFile"

  /projects/{id}/share:
    post:
      operationId: shareProject
      tags: [projects]
      summary: Generate a public share token for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Share token and URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareResult"
        "404":
          description: Not found

  /share/{token}:
    get:
      operationId: getSharedProject
      tags: [projects]
      summary: Get a shared project by token (public, read-only)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shared project with files
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedProject"
        "404":
          description: Not found

  /projects/{id}/generate:
    post:
      operationId: generateApp
      tags: [generate]
      summary: Run clarify (if needed) then planning (Phase 1, streaming). Pauses for clarifications or plan approval.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateAppBody"
      responses:
        "200":
          description: SSE stream — emits clarify_questions OR planning_chunk/plan/awaiting_approval
          content:
            text/event-stream:
              schema:
                type: string

  /projects/{id}/answer-clarifications:
    post:
      operationId: answerClarifications
      tags: [generate]
      summary: Submit answers to clarifying questions and resume into the planning phase (streaming).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerClarificationsBody"
      responses:
        "200":
          description: SSE stream of planning phase using the enriched prompt
          content:
            text/event-stream:
              schema:
                type: string

  /projects/{id}/approve-plan:
    post:
      operationId: approvePlan
      tags: [generate]
      summary: Approve plan, run code generation, then accuracy validation + repair (streaming).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovePlanBody"
      responses:
        "200":
          description: SSE stream of code generation, validation, repair
          content:
            text/event-stream:
              schema:
                type: string

  /projects/{id}/preview:
    get:
      operationId: getProjectPreview
      tags: [projects]
      summary: Render live HTML preview of the generated app
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Self-contained HTML preview document
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Not found or preview not yet generated

  /share/{token}/preview:
    get:
      operationId: getSharedProjectPreview
      tags: [projects]
      summary: Render live HTML preview of a shared project (public)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Self-contained HTML preview document
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Not found

  /projects/recent:
    get:
      operationId: getRecentProjects
      tags: [projects]
      summary: Get the 5 most recently updated projects
      responses:
        "200":
          description: Recent projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  /projects/stats:
    get:
      operationId: getProjectStats
      tags: [projects]
      summary: Get aggregate stats (total projects, total files generated, etc.)
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        prompt:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, awaiting_clarification, generating, awaiting_approval, complete, error]
        framework:
          type: string
          enum: [swiftui, uikit]
        fileCount:
          type: integer
        architecturePlan:
          type: ["string", "null"]
        clarifyingQuestions:
          type: ["string", "null"]
        clarifyAnswers:
          type: ["string", "null"]
        enrichedPrompt:
          type: ["string", "null"]
        accuracyReport:
          type: ["string", "null"]
        repairHistory:
          type: ["string", "null"]
        livePreviewHtml:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - prompt
        - description
        - status
        - framework
        - fileCount
        - architecturePlan
        - clarifyingQuestions
        - clarifyAnswers
        - enrichedPrompt
        - accuracyReport
        - repairHistory
        - livePreviewHtml
        - createdAt
        - updatedAt

    CreateProjectBody:
      type: object
      properties:
        name:
          type: string
        prompt:
          type: string
        framework:
          type: string
          enum: [swiftui, uikit]
      required:
        - name
        - prompt
        - framework

    ProjectFile:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        filename:
          type: string
        filepath:
          type: string
        content:
          type: string
        language:
          type: string
        createdAt:
          type: string
      required:
        - id
        - projectId
        - filename
        - filepath
        - content
        - language
        - createdAt

    GenerateAppBody:
      type: object
      properties:
        additionalContext:
          type: ["string", "null"]
      required: []

    ApprovePlanBody:
      type: object
      properties:
        plan:
          type: object
          properties:
            screens:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  purpose:
                    type: string
                required: [name, purpose]
            models:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  fields:
                    type: array
                    items:
                      type: string
                required: [name, fields]
            navigation:
              type: string
            spmDependencies:
              type: array
              items:
                type: object
                properties:
                  url:
                    type: string
                  packageName:
                    type: string
                  productNames:
                    type: array
                    items:
                      type: string
                  version:
                    type: string
                required: [url, packageName, productNames, version]
            fileList:
              type: array
              items:
                type: object
                properties:
                  filename:
                    type: string
                  purpose:
                    type: string
                required: [filename, purpose]
          required: [screens, models, navigation, spmDependencies, fileList]
        additionalContext:
          type: ["string", "null"]
      required:
        - plan

    AnswerClarificationsBody:
      type: object
      properties:
        skip:
          type: boolean
        answers:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              question:
                type: string
              answer:
                type: string
            required:
              - id
              - question
              - answer
        additionalContext:
          type: ["string", "null"]
      required:
        - answers

    ProjectStats:
      type: object
      properties:
        totalProjects:
          type: integer
        totalFilesGenerated:
          type: integer
        completedProjects:
          type: integer
        frameworkBreakdown:
          type: object
          properties:
            swiftui:
              type: integer
            uikit:
              type: integer
          required:
            - swiftui
            - uikit
      required:
        - totalProjects
        - totalFilesGenerated
        - completedProjects
        - frameworkBreakdown

    ShareResult:
      type: object
      properties:
        token:
          type: string
        url:
          type: string
      required:
        - token
        - url

    SharedProject:
      type: object
      properties:
        project:
          $ref: "#/components/schemas/Project"
        files:
          type: array
          items:
            $ref: "#/components/schemas/ProjectFile"
      required:
        - project
        - files
