kind = "web"
previewPath = "/"
title = "Prompt to iOS App"
version = "1.0.0"
id = "artifacts/promptios"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24810

[services.development]
run = "pnpm --filter @workspace/promptios run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/promptios", "run", "build" ]
publicDir = "artifacts/promptios/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24810"
BASE_PATH = "/"
